name: Node.js CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build
          touch out/.nojekyll

      - name: Deploy to public branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/ -f
          git stash
          git fetch origin public || true
          git checkout public || git checkout --orphan public
          git rm -rf . --cached --quiet
          git checkout stash -- out/
          cp -r out/. .
          rm -rf out/
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push origin public --force
