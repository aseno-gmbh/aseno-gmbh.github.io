name: Node.js CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  install:
    name: Abhängigkeiten installieren
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm
      - run: npm ci

  build:
    name: Node.js bauen
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Build
        run: |
          npm run build
          touch out/.nojekyll
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: out/

  publish:
    name: Publish to public branch
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: out/
      - name: Deploy to public branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin public || true
          git checkout public || git checkout --orphan public
          git rm -rf . 2>/dev/null || true
          cp -r out/. .
          touch .nojekyll
          rm -rf out/
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push origin public --force
